[FilterPlugin]
; Plugin manifest (required - Fab packager needs the .uplugin to identify the plugin)
/BPDoctor/BPDoctor.uplugin
; Source code (REQUIRED - Fab builds binaries from submitted source via RunUAT BuildPlugin)
/BPDoctor/Source/...
; Resources folder (icons, example config, bundled user guide)
/BPDoctor/Resources/...
; Config (filter rules, settings)
/BPDoctor/Config/...
; Documentation folder (HTML user guide - required by Fab TRC)
/BPDoctor/Documentation/...
; Root README.md (plugin overview for reviewers and users)
/BPDoctor/README.md
; License file (Fab submission checklist requires standalone license doc)
/BPDoctor/LICENSE.txt
